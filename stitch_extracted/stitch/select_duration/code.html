<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TurfZy - Select Duration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16c582",
                        "background-light": "#f6f8f7",
                        "background-dark": "#11211b",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Bar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="flex size-12 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-200 dark:hover:bg-primary/20 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Select Duration</h2>
</header>
<main class="flex-1 flex flex-col px-6 py-8">
<!-- Header Section -->
<div class="text-center mb-10">
<div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-4">
<span class="material-symbols-outlined text-primary text-3xl">schedule</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight mb-2">How long do you want to play?</h3>
<p class="text-slate-500 dark:text-slate-400">Choose a preset or set your custom time.</p>
</div>
<!-- Tab Switcher -->
<div class="flex mb-12">
<div class="flex h-14 flex-1 items-center justify-center rounded-full bg-slate-200 dark:bg-primary/10 p-1.5">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-300 text-sm font-semibold transition-all">
<span>1 Hour</span>
<input checked="" class="invisible w-0" name="duration_type" type="radio" value="1h"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-300 text-sm font-semibold transition-all">
<span>2 Hours</span>
<input class="invisible w-0" name="duration_type" type="radio" value="2h"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-300 text-sm font-semibold transition-all">
<span>Custom</span>
<input class="invisible w-0" name="duration_type" type="radio" value="custom"/>
</label>
</div>
</div>
<!-- Custom Picker Controls -->
<div class="flex flex-col items-center justify-center space-y-4 mb-12">
<h4 class="text-primary text-sm font-bold uppercase tracking-widest mb-4">Adjust Custom Duration</h4>
<div class="flex w-full max-w-sm gap-4 items-center">
<!-- Hours Column -->
<div class="flex-1 flex flex-col items-center">
<span class="text-xs font-bold text-slate-400 mb-2 uppercase">Hours</span>
<div class="w-full space-y-2">
<div class="text-slate-400 text-lg font-medium py-3 text-center opacity-40">0</div>
<div class="text-slate-900 dark:text-white text-3xl font-bold py-4 text-center bg-slate-200 dark:bg-primary/20 rounded-xl border-2 border-primary/30">
                                1
                            </div>
<div class="text-slate-400 text-lg font-medium py-3 text-center opacity-40">2</div>
</div>
</div>
<!-- Separator -->
<div class="text-4xl font-bold text-primary self-center pt-8">:</div>
<!-- Minutes Column -->
<div class="flex-1 flex flex-col items-center">
<span class="text-xs font-bold text-slate-400 mb-2 uppercase">Minutes</span>
<div class="w-full space-y-2">
<div class="text-slate-400 text-lg font-medium py-3 text-center opacity-40">15 min</div>
<div class="text-slate-900 dark:text-white text-3xl font-bold py-4 text-center bg-slate-200 dark:bg-primary/20 rounded-xl border-2 border-primary/30">
                                30 min
                            </div>
<div class="text-slate-400 text-lg font-medium py-3 text-center opacity-40">45 min</div>
</div>
</div>
</div>
</div>
<!-- Summary Card -->
<div class="bg-white dark:bg-slate-800/50 p-6 rounded-lg border border-slate-200 dark:border-primary/10 mb-8">
<div class="flex justify-between items-center">
<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">Total Time</p>
<p class="text-slate-900 dark:text-white text-xl font-bold">1 Hour 30 Minutes</p>
</div>
<div class="text-right">
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">Estimated Price</p>
<p class="text-primary text-xl font-bold">$45.00</p>
</div>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-auto">
                Confirm Selection
            </button>
</main>
<!-- Image Placeholder for Context -->
<div class="hidden">
<img alt="Contextual sports background" data-alt="Action shot of a football match on a green turf" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMdhVNiiWE0dOUDZps-Mp-lnZ2xbkmIeuUk6VxwfJlxHw_I5zgDmRd-Yfy9PFcSjax2Cbl8PmN7sCEJqldtSKIOdKD3fSaJLCljXqGLjSbuIOj8ZJjqu5A8avfrSo3P2JcRs7XRrOK3W47D26rbS4CDr9z3EFh-o-omREHmtORAqkmIL8DsyMdU0TJnJ_edz7rrOPFEHZEhUfTb6HTmV_rOKWMaOeLTqBF8VIOg0ndsPvihnQN3kKcM18LhoYSekKaO2duuUVKSg"/>
</div>
</div>
</body></html>
