<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16c582",
                        "background-light": "#f6f8f7",
                        "background-dark": "#11211b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .stadium-gradient {
            background: radial-gradient(circle at top, rgba(22, 197, 130, 0.15) 0%, rgba(17, 33, 27, 1) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden stadium-gradient">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full bg-slate-200/50 dark:bg-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Verification</h2>
</div>
<div class="flex flex-col items-center justify-center px-6 pt-12 pb-8">
<div class="mb-8 p-4 rounded-full bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-5xl">phonelink_lock</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight text-center pb-3">Enter OTP</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal text-center max-w-sm">
                We've sent a 6-digit verification code to your registered mobile number for <span class="text-primary font-semibold">TurfZy</span> access.
            </p>
</div>
<!-- OTP Input Fields -->
<div class="flex justify-center px-6 py-6">
<fieldset class="relative flex gap-3 sm:gap-4">
<input class="flex h-16 w-12 sm:w-14 text-center rounded-xl bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 text-xl font-bold dark:text-white" inputmode="numeric" maxlength="1" type="text"/>
<input class="flex h-16 w-12 sm:w-14 text-center rounded-xl bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 text-xl font-bold dark:text-white" inputmode="numeric" maxlength="1" type="text"/>
<input class="flex h-16 w-12 sm:w-14 text-center rounded-xl bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 text-xl font-bold dark:text-white" inputmode="numeric" maxlength="1" type="text"/>
<input class="flex h-16 w-12 sm:w-14 text-center rounded-xl bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 text-xl font-bold dark:text-white" inputmode="numeric" maxlength="1" type="text"/>
<input class="flex h-16 w-12 sm:w-14 text-center rounded-xl bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 text-xl font-bold dark:text-white" inputmode="numeric" maxlength="1" type="text"/>
<input class="flex h-16 w-12 sm:w-14 text-center rounded-xl bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 text-xl font-bold dark:text-white" inputmode="numeric" maxlength="1" type="text"/>
</fieldset>
</div>
<!-- Timer Display -->
<div class="flex gap-4 py-8 px-6 max-w-xs mx-auto w-full">
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-16 grow items-center justify-center rounded-xl bg-slate-200/50 dark:bg-primary/10 border border-slate-300 dark:border-primary/20">
<p class="text-slate-900 dark:text-primary text-2xl font-bold leading-tight">01</p>
</div>
<div class="flex items-center justify-center"><p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">Minutes</p></div>
</div>
<div class="flex items-center justify-center pb-6">
<span class="text-2xl font-bold text-primary">:</span>
</div>
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-16 grow items-center justify-center rounded-xl bg-slate-200/50 dark:bg-primary/10 border border-slate-300 dark:border-primary/20">
<p class="text-slate-900 dark:text-primary text-2xl font-bold leading-tight">58</p>
</div>
<div class="flex items-center justify-center"><p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">Seconds</p></div>
</div>
</div>
<!-- Actions -->
<div class="mt-auto p-6 space-y-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                Verify &amp; Continue
                <span class="material-symbols-outlined">chevron_right</span>
</button>
<div class="flex flex-col items-center gap-2 pt-4">
<p class="text-slate-500 dark:text-slate-400 text-sm">Didn't receive the code?</p>
<button class="text-primary font-bold text-sm hover:underline flex items-center gap-1">
<span class="material-symbols-outlined text-lg">refresh</span>
                    Resend Code
                </button>
</div>
</div>
<!-- Decorative Stadium Element -->
<div class="absolute bottom-0 left-0 right-0 h-1 bg-primary/20 blur-sm"></div>
<div class="absolute -bottom-24 left-1/2 -translate-x-1/2 w-[150%] h-48 bg-primary/5 rounded-[100%] blur-3xl"></div>
</div>
</body></html>
