<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                        "background-dark": "#11211b",

                    fontFamily: {

                },

        }
    </script>
<style>
    body {

<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-slate-200 dark:bg-slate-800 @[480px]:rounded-xl min-h-[420px] shadow-2xl relative" data-alt="A group of diverse sports players celebrating together on a field" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAmT282joALHgpg0HE88A8wDBznoWhtuB0qikBlR0VmlrHlR4XrwbOqT_sKnrz88_j910n0jZ2tLdIXmocGdzrzORIf9c18aUVWRy112SslihBdQr1Yoygao98od2uYPj4siefLpDwWL7L-YWJ5-PXggXWqdTs9jYMXOyLMIFxYU9HVJOJlGpwAeCi6IBbJmbm6VjRuoT5we8V-m1wQuAGE1CubjsIFOHLnIcYyLE-wE81xAMg3TXH6Lvxo42pnbvteImhlVGIjGA");'>

<div class="absolute inset-0 bg-gradient-to-t from-background-dark/60 to-transparent"></div>
</div>
</div>
</div>
<!-- Pagination Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-8">
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-primary/20"></div>
<div class="h-2 w-10 rounded-full bg-primary"></div>
</div>
<!-- Content Section -->
<div class="px-6 flex flex-col items-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-center pb-3">
                Play &amp; Compete
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center max-w-sm">
                Join local matches, host your own games, and climb the leaderboards in your favorite sports with a community of enthusiasts.
            </p>
</div>
<!-- Action Button -->
<div class="mt-auto p-6 pb-12 w-full flex flex-col gap-4">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
<span>Get Started</span>
<span class="material-symbols-outlined">trending_flat</span>
</button>
<button class="w-full bg-transparent text-primary font-semibold py-2 rounded-xl transition-colors">
                Already have an account? Log In
            </button>
