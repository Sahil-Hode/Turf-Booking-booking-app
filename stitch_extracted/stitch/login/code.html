<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TurfZy - Premium Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16c582",
                        "background-light": "#f6f8f7",
                        "background-dark": "#11211b",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="relative min-h-screen flex items-center justify-center p-4">
<!-- Background Image with Overlay -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-background-dark/80 via-background-dark/60 to-primary/20 z-10"></div>
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Wide shot of a modern brightly lit indoor soccer arena" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDKjuwHB7H-EH6cxvOHTM22V5-nslpYuTMTN5XtWxQKlAsWMajwVwbF5OTHVbaU8_jo917VHzLQbPNYg2L5oqJ8IZzGCsTL5pLkWSJuvhv0aKh5KlXu0PAu_9HrevqlvomLzSsssLweQTNVesZPVq0QYtj_b4WF4Z8hShWGr4MaoTrT-JzFv8I6wYfNUVcQbaPdjbkAK_uLFYZPs10PTDvA0WjmXz61vZ3P7ABXLvSp_KlukR39VLXpRsZ_BNYZ48RbinXLmWzlAw");'>
</div>
</div>
<!-- Glassmorphism Login Container -->
<div class="relative z-20 w-full max-w-md">
<div class="bg-background-dark/40 backdrop-blur-xl border border-primary/20 rounded-xl p-8 shadow-2xl overflow-hidden">
<!-- Logo & Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/20 mb-4 border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl">sports_soccer</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">Welcome to TurfZy</h1>
<p class="text-slate-300">Book your favorite arena in seconds</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-xl">mail</span>
<input class="w-full bg-background-dark/50 border border-primary/20 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-medium text-slate-300">Password</label>
<a class="text-xs text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-xl">lock</span>
<input class="w-full bg-background-dark/50 border border-primary/20 rounded-xl py-4 pl-12 pr-12 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-primary/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-dark/0 px-4 text-slate-400 backdrop-blur-sm">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl py-3 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-white">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl py-3 transition-colors">
<svg class="w-5 h-5 fill-white" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z"></path>
</svg>
<span class="text-sm font-medium text-white">Apple</span>
</button>
</div>
<!-- Signup Footer -->
<div class="mt-8 text-center">
<p class="text-slate-400 text-sm">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Register now</a>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex justify-center space-x-6 text-xs text-slate-400 uppercase tracking-widest">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="text-slate-700">•</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="text-slate-700">•</span>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</div>
</body></html>
