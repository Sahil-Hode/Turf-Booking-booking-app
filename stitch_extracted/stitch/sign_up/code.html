                        "background-light": "#f6f8f7",
                        "background-dark": "#11211b",

                        "display": ["Inter", "sans-serif"]

        }

<style>
        body {
            font-family: 'Inter', sans-serif;
        }

            box-shadow: 0 0 15px rgba(22, 197, 130, 0.3);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Create Account</h2>
</header>
<main class="flex-1 px-6 pb-12 max-w-md mx-auto w-full">
<div class="pt-8 pb-6">
<div class="inline-flex items-center justify-center p-3 mb-6 rounded-2xl bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary" style="font-size: 32px;">sports_soccer</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[36px] font-bold leading-tight">Join TurfZy</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-normal leading-normal mt-2">Step onto the field. Sign up to start booking your next match.</p>
</div>
<form class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold px-1">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="form-input flex w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 pl-11 pr-4 h-14 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-primary/40 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" placeholder="Cristiano Ronaldo" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold px-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="form-input flex w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 pl-11 pr-4 h-14 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-primary/40 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" placeholder="cr7@turfzy.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold px-1">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">call</span>
</div>
<input class="form-input flex w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 pl-11 pr-4 h-14 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-primary/40 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg h-14 rounded-xl neon-glow transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                        Get Started
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-primary/10"></div>
<span class="text-slate-400 text-sm font-medium">or continue with</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-primary/10"></div>
</div>
<div class="mt-6 flex gap-4">
<button class="flex-1 flex items-center justify-center h-14 rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 hover:bg-slate-50 dark:hover:bg-primary/10 transition-colors">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

</button>

</div>
<p class="mt-10 text-center text-slate-500 dark:text-slate-400 text-sm">
                Already have an account?

</p>
</main>
<footer class="mt-auto px-6 py-8 text-center">
<p class="text-[10px] text-slate-400 dark:text-primary/30 uppercase tracking-[0.2em]">
                Secure &amp; Fast Bookings • © 2024 TurfZy Inc.
            </p>
</footer>
</div>
<div class="fixed top-0 right-0 p-8 -z-10 opacity-20 pointer-events-none">
<div class="w-64 h-64 bg-primary rounded-full blur-[100px]"></div>
</div>
<div class="fixed bottom-0 left-0 p-8 -z-10 opacity-10 pointer-events-none">
